            --input-bg: #fafafa;
            --output-bg: #f8f9fa;
            --btn-bg: #409eff;
            --btn-hover-bg: #66b1ff;
            --btn-text: #ffffff;
        }

        /* 暗黑主题（默认启用） */
        .dark-mode {
            --bg-main: #1a1a2e;
            --bg-container: #16213e;
            --text-primary: #e9ecef;
            --text-secondary: #ced4da;
            --text-tertiary: #adb5bd;
            --border-color: #343a40;
            --input-bg: #222831;
            --output-bg: #1e2430;
            --btn-bg: #00b4d8;
            --btn-hover-bg: #48cae4;
            --btn-text: #ffffff;
        }

        body {
            background-color: var(--bg-main);
            padding: 40px 20px;
            color: var(--text-primary);
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--bg-container);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }

        /* 主题切换按钮样式 */
        .theme-switch {
            text-align: right;
            margin-bottom: 20px;
        }

        .switch-btn {
            padding: 6px 12px;
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-left: auto;
        }

        .switch-btn:hover {
            background-color: var(--btn-hover-bg);
        }

        h1 {
            text-align: center;
            color: var(--text-primary);
            font-size: 24px;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .input-area, .output-area {
            width: 100%;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            line-height: 1.6;
            resize: vertical;
            color: var(--text-secondary);
        }

        .input-area {
            height: 180px;
            margin-bottom: 20px;
            background: var(--input-bg);
        }

        .btn-container {
            text-align: center;
            margin: 25px 0;
        }

        .format-btn {
            padding: 12px 36px;
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .format-btn:hover {
            background-color: var(--btn-hover-bg);
        }

        .output-area {
            height: 200px;
            background: var(--output-bg);
            color: var(--text-primary);
            font-family: "Consolas", monospace;
        }

        .help-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px dashed var(--border-color);
            color: var(--text-tertiary);
            font-size: 13px;
            line-height: 1.8;
        }

        .help-section h3 {
            color: var(--text-secondary);
            font-size: 15px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body class="dark-mode"> <!-- 默认添加dark-mode类 -->
<div class="container">
    <!-- 主题切换按钮 -->
    <div class="theme-switch">
        <button class="switch-btn" onclick="toggleDarkMode()">
            <span id="theme-icon">☀️</span>
            <span id="theme-text">切换亮色模式</span>
        </button>
    </div>

    <h1>MyBatis SQL 日志格式化工具</h1>

    <!-- 输入区域 -->
    <textarea class="input-area" onfocus="fillSampleContent()" placeholder="请复制MyBatis的SQL相关日志（共两行）：
示例：
[2020-01-10 15:00:00] [DEBUG] getUserList.debug(159) - ==> Preparing: select user_id, user_name from t_user where delete_flag = ? and status = ? order by created_date desc
[2020-01-10 15:00:00] [DEBUG] getUserList.debug(159) - ==> Parameters: N(String), 01(String)"></textarea>

    <!-- 格式化按钮 -->
    <div class="btn-container">
        <button class="format-btn" onclick="formatMyBatisLog()">格式化</button>
    </div>

    <!-- 输出区域 -->
    <textarea class="output-area" readonly placeholder="格式化后的SQL会显示在这里..."></textarea>

    <!-- 使用帮助 -->
    <div class="help-section">
        <h3>使用帮助：</h3>
        <p>1）将日志中MyBatis的SQL相关日志复制到上方的文本框中。共两行，其中第一行是SQL语句（包含Preparing关键字），第二行是参数（包含Parameters关键字）。</p>
        <p>2）点击中间“格式化”按钮执行格式化操作，格式化结果会显示在下方文本框中。</p>
    </div>
</div>

<script>
    // 主题切换逻辑（记忆用户偏好，刷新后保持状态）
    function toggleDarkMode() {
        const body = document.body;
        const isDark = body.classList.toggle('dark-mode');
        const themeIcon = document.getElementById('theme-icon');
        const themeText = document.getElementById('theme-text');

        // 更新按钮文案和图标
        if (isDark) {
            themeIcon.textContent = '☀️';
            themeText.textContent = '切换亮色模式';
            // 本地存储记录暗黑模式状态
            localStorage.setItem('darkMode', 'true');
        } else {
            themeIcon.textContent = '🌙';
            themeText.textContent = '切换暗黑模式';
            localStorage.setItem('darkMode', 'false');
        }
    }

    // 页面加载时恢复用户主题偏好（优先级高于默认）
    window.onload = function() {
        const savedMode = localStorage.getItem('darkMode');
        // 如果本地有存储的主题，优先使用存储的设置
        if (savedMode !== null) {
            const body = document.body;
            const themeIcon = document.getElementById('theme-icon');
            const themeText = document.getElementById('theme-text');

            if (savedMode === 'false') {
                body.classList.remove('dark-mode');
                themeIcon.textContent = '🌙';
                themeText.textContent = '切换暗黑模式';
            } else {
                body.classList.add('dark-mode');
                themeIcon.textContent = '☀️';
                themeText.textContent = '切换亮色模式';
            }
        }
    };

    // 核心格式化逻辑（保持原功能不变）
    function formatMyBatisLog() {
        const input = document.querySelector('.input-area').value.trim();
        if (!input) {
            alert('请复制MyBatis的SQL日志后再格式化！');
            return;
        }

        const prepareRegex = /==> +Preparing:\s*(.+)/;
        const paramRegex = /==> +Parameters:\s*(.+)/;
        const sqlMatch = input.match(prepareRegex);
        const paramMatch = input.match(paramRegex);

        if (!sqlMatch || !paramMatch) {
            alert('日志格式不正确！请确保包含Preparing和Parameters关键字的两行日志');
            document.querySelector('.output-area').value = '';
            return;
        }

        // SQL排版优化
        let sql = sqlMatch[1].trim();
        sql = sql.replace(/\bselect\b/i, '\nSELECT')
            .replace(/\bfrom\b/i, '\nFROM')
            .replace(/\bwhere\b/i, '\nWHERE')
            .replace(/\border by\b/i, '\nORDER BY')  // 匹配完整的order by，无多余空格
            .replace(/\bgroup by\b/i, '\nGROUP BY')
            .replace(/\blimit\b/i, '\nLIMIT')
            .replace(/\band\b/i, '\n  AND')
            .replace(/\bor\b/i, '\n  OR');

        // 参数处理（去除类型标识+替换占位符）
        const paramStr = paramMatch[1].trim();
        // 匹配 "值(类型)" 格式，分组提取值和类型
        const paramRegexDetail = /([^,]+)\(([^)]+)\)/g;
        const params = [];
        let match;
        while ((match = paramRegexDetail.exec(paramStr)) !== null) {
            const value = match[1].trim();
            const type = match[2].trim();
            params.push({ value, type });
        }

        // 根据参数类型处理引号
        params.forEach(({ value, type }) => {
            let replaceVal;
            switch (type.toLowerCase()) {
                case 'string':
                    replaceVal = `'${value}'`; // 字符串加单引号
                    break;
                case 'boolean':
                    replaceVal = value.toLowerCase(); // 布尔值小写
                    break;
                case 'integer':
                case 'int':
                case 'double':
                case 'float':
                case 'long':
                    replaceVal = value; // 数字类型不加引号
                    break;
                default:
                    replaceVal = `'${value}'`; // 未知类型默认按字符串处理
            }
            sql = sql.replace(/\?/, replaceVal);
        });

        // 输出结果
        document.querySelector('.output-area').value = sql.trim();
    }

    // 样例内容常量
    const SAMPLE_CONTENT = `[2020-01-10 15:00:00] [DEBUG] getUserList.debug(159) - ==> Preparing: select user_id, user_name from t_user where delete_flag = ? and status = ? order by created_date desc
[2020-01-10 15:00:00] [DEBUG] getUserList.debug(159) - ==> Parameters: N(String), 01(String)`;

    // 激活输入框时填充样例内容（仅当输入框为空时）
    function fillSampleContent() {
        const inputArea = document.querySelector('.input-area');
        // 去除首尾空白后判断是否为空
        if (inputArea.value.trim() === '') {
            // inputArea.value = SAMPLE_CONTENT;
            inputArea.value = '';
        }
    }
</script>
</body>
</html>
